name: Android CI (Auto Build APK)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 1. Pehle Java 17 set kar rahe hain taake Android SDK/CMake bina kisi error ke install ho sakein
    - name: Set up JDK 17 (For SDK Tools)
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK Tools
      uses: android-actions/setup-android@v3

    - name: Set up Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: 21.0.6113669
        local-cache: true

    - name: Install CMake 3.10.2 (Auto-Accept Licenses)
      run: |
        yes | sdkmanager --licenses
        sdkmanager --install "cmake;3.10.2.4988404"

    # 2. Ab Java 8 par switch kar rahe hain kyunki aapke project ki build Java 8 mangti hai
    - name: Switch to JDK 8 (For Gradle Build)
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Unzip Project Files
      run: |
        if [ -f "project.zip.zip" ]; then unzip -o project.zip.zip -d .; fi
        if [ -f "project.zip" ]; then unzip -o project.zip -d .; fi

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    - name: Build APK with Gradle
      run: ./gradlew assembleDebug

    - name: Upload Output APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ModMenu-Debug-APK
        path: "**/build/outputs/apk/debug/*.apk"
