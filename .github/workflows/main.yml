name: Android CI (Auto Build APK)
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17 (For SDK Tools)
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK Tools
      uses: android-actions/setup-android@v3

    - name: Set up Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r21e
        local-cache: true

    - name: Install CMake 3.10.2 (Auto-Accept Licenses)
      run: |
        yes | sdkmanager --licenses || true
        sdkmanager --install "cmake;3.10.2.4988404"

    - name: Switch to JDK 8 (For Gradle Build)
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Unzip Project Files
      run: |
        if [ -f project.zip.zip ]; then unzip -o project.zip.zip -d .; fi
        if [ -f project.zip ]; then unzip -o project.zip -d .; fi

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    - name: Force Correct NDK Version in build.gradle
      run: |
        APP_GRADLE=$(find . -name "build.gradle" -path "*/app/*" | head -n 1)
        echo "Editing: $APP_GRADLE"
        if grep -q "ndkVersion" "$APP_GRADLE"; then
          sed -i 's/ndkVersion .*/ndkVersion "21.0.6113669"/' "$APP_GRADLE"
        else
          sed -i '/android {/a\    ndkVersion "21.0.6113669"' "$APP_GRADLE"
        fi
        echo "----- Verifying -----"
        grep -A2 -B2 "ndkVersion" "$APP_GRADLE"

    - name: Build APK with Gradle
      run: ./gradlew assembleDebug

    - name: Upload Output APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ModMenu-Debug-APK
        path: "**/build/outputs/apk/debug/*.apk"
