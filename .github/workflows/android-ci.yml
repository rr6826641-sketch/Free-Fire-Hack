# Ek line mein poora setup
mkdir -p .github/workflows && cat > .github/workflows/android-ci.yml << 'EOF'
name: 🤖 Android CI - Auto Build APK

on:
  push:
    branches: [ "main", "master", "develop" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
          - both

env:
  JAVA_VERSION: '17'
  GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2'

jobs:
  build:
    name: 🔨 Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    outputs:
      version_name: ${{ steps.version.outputs.name }}
      version_code: ${{ steps.version.outputs.code }}

    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: recursive

    - name: ☕ Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: 'gradle'

    - name: 📱 Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: 📦 Extract Project Files
      run: |
        echo "🔍 Searching for zip files..."
        if [ -f "project.zip.zip" ]; then
          echo "📦 Extracting project.zip.zip..."
          unzip -q project.zip.zip -d .
          echo "✅ Extracted project.zip.zip"
        fi
        if [ -f "project.zip" ]; then
          echo "📦 Extracting project.zip..."
          unzip -q project.zip -d .
          echo "✅ Extracted project.zip"
        fi
        echo "📂 Current directory contents:"
        ls -la
        echo "🔍 Searching for gradlew:"
        find . -name "gradlew" -type f

    - name: 🔐 Validate Gradle Wrapper
      uses: gradle/wrapper-validation-action@v2

    - name: 🔧 Grant Execute Permissions
      run: |
        chmod +x gradlew || echo "⚠️ gradlew not found in root"
        find . -name "gradlew" -type f -exec chmod +x {} \;
        echo "✅ Permissions set"

    - name: 💾 Cache Gradle Dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          ~/.android/build-cache
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: 📋 Get Version Info
      id: version
      run: |
        VERSION_NAME=$(grep "versionName" app/build.gradle | awk '{print $2}' | tr -d '"' || echo "1.0.0")
        VERSION_CODE=$(grep "versionCode" app/build.gradle | awk '{print $2}' || echo "1")
        echo "name=$VERSION_NAME" >> $GITHUB_OUTPUT
        echo "code=$VERSION_CODE" >> $GITHUB_OUTPUT
        echo "📱 Version: $VERSION_NAME ($VERSION_CODE)"

    - name: 🧹 Clean Project
      run: ./gradlew clean --stacktrace

    - name: 🔨 Build Debug APK
      if: ${{ github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == 'both' || github.event.inputs.build_type == '' }}
      run: |
        echo "🔨 Building Debug APK..."
        ./gradlew assembleDebug --stacktrace --info
        echo "✅ Debug APK built successfully"

    - name: 🚀 Build Release APK
      if: ${{ github.event.inputs.build_type == 'release' || github.event.inputs.build_type == 'both' }}
      run: |
        echo "🚀 Building Release APK..."
        ./gradlew assembleRelease --stacktrace
        echo "✅ Release APK built successfully"
      continue-on-error: true

    - name: 🔍 List Generated APK Files
      run: |
        echo "=== 📱 Generated APK Files ==="
        find . -name "*.apk" -type f -exec ls -lh {} \;
        echo "=============================="

    - name: 🏷️ Rename APK Files
      run: |
        VERSION="${{ steps.version.outputs.name }}"
        BUILD="${{ github.run_number }}"
        for apk in app/build/outputs/apk/debug/*.apk; do
          if [ -f "$apk" ]; then
            mv "$apk" "app/build/outputs/apk/debug/ModMenu-v${VERSION}-debug-${BUILD}.apk"
          fi
        done
        for apk in app/build/outputs/apk/release/*.apk; do
          if [ -f "$apk" ]; then
            mv "$apk" "app/build/outputs/apk/release/ModMenu-v${VERSION}-release-${BUILD}.apk"
          fi
        done

    - name: 📤 Upload Debug APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ModMenu-Debug-APK-${{ github.run_number }}
        path: |
          **/build/outputs/apk/debug/*.apk
          **/build/outputs/apk/debug/output-metadata.json
        retention-days: 30
        if-no-files-found: warn

    - name: 📤 Upload Release APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: ModMenu-Release-APK-${{ github.run_number }}
        path: |
          **/build/outputs/apk/release/*.apk
          **/build/outputs/apk/release/output-metadata.json
        retention-days: 90
        if-no-files-found: ignore

    - name: 📊 Build Summary
      if: always()
      run: |
        echo "### 🎯 Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| **Status** | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
        echo "| **Branch** | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
        echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| **Run Number** | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
        echo "| **Version** | ${{ steps.version.outputs.name }} (${{ steps.version.outputs.code }}) |" >> $GITHUB_STEP_SUMMARY

  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    needs: build
    if: success()
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'
    
    - name: Grant Permissions
      run: chmod +x gradlew
    
    - name: Run Unit Tests
      run: ./gradlew test --stacktrace
      continue-on-error: true
    
    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Test-Results-${{ github.run_number }}
        path: |
          **/build/reports/tests/
          **/build/test-results/
        retention-days: 7
EOF

git add .github/workflows/android-ci.yml
git commit -m "Add Android CI workflow"
git push origin main
